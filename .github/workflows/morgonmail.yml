name: morgonmail

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 10:00 Vietnam time (UTC+7)
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials from secrets
        env:
          CREDS_B64: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          echo "$CREDS_B64" | base64 -d > credentials.json
          echo "$TOKEN_B64" | base64 -d > token.json

      - name: Run morgonmail
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python main.py
